name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy-ssh-pull:
    name: Deploy via SSH Pull
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 1. Deploy Frontend to /var/www/task-flow
            echo "Deploying Frontend..."
            cd /var/www/task-flow
            git reset --hard
            git pull origin main
            rm -f AGENTS.md task-flow.md
            cd frontend
            npm install
            npm run build

            # 2. Deploy Backend to /home/task-flow-backend
            echo "Deploying Backend..."
            cd /home/task-flow-backend
            git reset --hard
            git pull origin main
            rm -f AGENTS.md task-flow.md
            cd backend

            # Backup database before running db push to ensure data safety
            if [ -f "prisma/dev.db" ]; then
              echo "Backing up SQLite database..."
              mkdir -p /home/task-flow-backend/backups
              cp prisma/dev.db /home/task-flow-backend/backups/dev.db.bak.$(date +%Y%m%d%H%M%S)
            fi

            npm install
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 restart task-flow-backend --update-env || pm2 start dist/index.js --name "task-flow-backend"

