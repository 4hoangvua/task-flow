# ==============================================================================
# HOW TO SET UP SPARSE CHECKOUT ON YOUR SERVER FOR THE 2 DIFFERENT DIRECTORIES:
# ==============================================================================
# 
# A. For Frontend (in /var/www/task-flow):
#    1. Navigate to directory and clone the repo without checking out:
#       cd /var/www
#       git clone --no-checkout <your-repo-url> task-flow
#       cd task-flow
#    2. Enable sparse-checkout and specify the frontend folder:
#       git sparse-checkout init --cone
#       git sparse-checkout set frontend
#    3. Checkout main branch:
#       git checkout main
#
# B. For Backend (in /home/task-flow-backend):
#    1. Navigate to directory and clone the repo without checking out:
#       cd /home
#       git clone --no-checkout <your-repo-url> task-flow-backend
#       cd task-flow-backend
#    2. Enable sparse-checkout and specify the backend folder:
#       git sparse-checkout init --cone
#       git sparse-checkout set backend
#    3. Checkout main branch:
#       git checkout main
# ==============================================================================

