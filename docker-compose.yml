version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-flow-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=super-secret-access-token-key-change-in-production
      - JWT_REFRESH_SECRET=super-secret-refresh-token-key-change-in-production
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:8080
    volumes:
      - backend-db:/app/prisma
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-flow-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
    name: task-flow-db-volume
