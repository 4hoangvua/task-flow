# ==============================================================================
# Cấu hình Nginx tham khảo cho dự án TaskFlow
# Vị trí trên server: /etc/nginx/sites-available/task-flow
# ==============================================================================

server {
    listen 80;
    server_name hoangtran.name.vn www.hoangtran.name.vn 3.239.239.72;

    # Cấu hình phục vụ thư mục tĩnh Frontend React
    root /var/www/task-flow/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình Reverse Proxy cho Backend API
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Thêm CORS headers nếu cần thiết
        add_header 'Access-Control-Allow-Origin' 'http://hoangtran.name.vn' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # Cấu hình định tuyến kết nối Socket.io (WebSocket)
    location /socket.io/ {
        proxy_pass http://localhost:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Cấu hình nén gzip để tối ưu tốc độ load trang
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
